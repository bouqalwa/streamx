<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamX Secure Pro</title>

    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --bg: #030305;
            --surface: #0f0f13;
            --surface-2: #181820;
            --surface-3: #22222d;
            --border: rgba(255,255,255,0.09);
            --text: #ffffff;
            --muted: #9a9aaa;
            --brand: #e50914;
            --brand-2: #ff2330;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 20px;
            --shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Satoshi", system-ui, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(229,9,20,0.16), transparent 34rem),
                radial-gradient(circle at top right, rgba(255,255,255,0.06), transparent 30rem),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        button, input, select {
            font: inherit;
            color: inherit;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .hidden {
            display: none !important;
        }

        .app {
            max-width: 1900px;
            margin: 0 auto;
            padding: 22px 42px;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 0 24px;
            background: linear-gradient(to bottom, rgba(3,3,5,0.96), rgba(3,3,5,0.75), transparent);
            backdrop-filter: blur(14px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: -0.04em;
        }

        .brand-icon {
            width: 34px;
            height: 34px;
            color: var(--brand);
        }

        .grow {
            flex: 1;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 9px;
            color: var(--muted);
            font-weight: 700;
            white-space: nowrap;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
        }

        .status-dot.active {
            background: var(--success);
            box-shadow: 0 0 16px var(--success);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 999px;
            padding: 11px 22px;
            font-weight: 800;
            border: 1px solid transparent;
            transition: transform .2s ease, background .2s ease, border .2s ease, opacity .2s ease;
        }

        .btn:hover {
            transform: translateY(-1px) scale(1.02);
        }

        .btn-brand {
            background: var(--brand);
            color: #fff;
        }

        .btn-brand:hover {
            background: var(--brand-2);
        }

        .btn-soft {
            background: rgba(255,255,255,0.09);
            color: #fff;
            border-color: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
        }

        .btn-soft:hover {
            background: rgba(255,255,255,0.15);
        }

        .btn-small {
            padding: 8px 14px;
            font-size: .9rem;
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1fr 180px 260px;
            gap: 14px;
            margin-bottom: 34px;
        }

        .input {
            width: 100%;
            border: 1px solid transparent;
            outline: none;
            border-radius: 999px;
            padding: 13px 18px;
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .input:focus {
            border-color: rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.12);
        }

        .hero-empty {
            text-align: center;
            padding: 130px 20px;
            color: var(--muted);
        }

        .hero-empty h1 {
            color: #fff;
            font-size: clamp(2rem, 5vw, 4rem);
            margin-bottom: 12px;
            letter-spacing: -0.05em;
        }

        .section {
            margin-bottom: 54px;
        }

        .section-head {
            display: flex;
            align-items: end;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .section-head h2 {
            font-size: 1.7rem;
            letter-spacing: -0.04em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 22px;
        }

        .grid.landscape {
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
        }

        .card {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            background: var(--surface);
            aspect-ratio: 2 / 3;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
            transition: transform .22s ease, border .22s ease, box-shadow .22s ease;
        }

        .card.landscape {
            aspect-ratio: 16 / 9;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.025);
            border-color: rgba(255,255,255,0.18);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            z-index: 2;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .35s ease;
        }

        .card:hover img {
            transform: scale(1.07);
        }

        .card-gradient {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px;
            background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.35), transparent);
        }

        .card-title {
            font-weight: 900;
            line-height: 1.15;
            margin-bottom: 7px;
            text-shadow: 0 2px 10px #000;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            display: flex;
            gap: 7px;
            align-items: center;
            color: var(--muted);
            font-size: .84rem;
            font-weight: 700;
        }

        .type-pill {
            color: var(--brand-2);
            font-weight: 900;
        }

        .progress {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 4px;
            background: rgba(255,255,255,0.18);
        }

        .progress > div {
            height: 100%;
            background: var(--brand);
        }

        dialog {
            margin: auto;
            border: none;
            background: transparent;
            color: #fff;
            padding: 0;
            max-width: 100vw;
            max-height: 100vh;
        }

        dialog::backdrop {
            background: rgba(0,0,0,0.82);
            backdrop-filter: blur(10px);
        }

        .modal {
            width: min(1080px, 94vw);
            max-height: 90vh;
            overflow: hidden;
            border-radius: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .login-modal {
            width: min(440px, 92vw);
            padding: 34px;
        }

        .login-modal h2 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .login-modal p {
            color: var(--muted);
            margin-bottom: 24px;
        }

        .login-form {
            display: grid;
            gap: 14px;
        }

        .details-hero {
            height: 390px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: end;
            padding: 34px;
        }

        .details-hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--surface), rgba(15,15,19,0.72), rgba(15,15,19,0.1));
        }

        .details-content {
            position: relative;
            z-index: 1;
            max-width: 820px;
        }

        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .badge {
            padding: 5px 11px;
            border-radius: 999px;
            background: rgba(255,255,255,0.1);
            font-size: .85rem;
            font-weight: 800;
        }

        .badge.brand {
            background: var(--brand);
        }

        .details-content h2 {
            font-size: clamp(2rem, 5vw, 4rem);
            line-height: 1;
            letter-spacing: -0.06em;
            margin-bottom: 14px;
        }

        .details-desc {
            color: #ddd;
            max-width: 760px;
            margin-bottom: 22px;
        }

        .details-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .details-body {
            padding: 30px 34px 36px;
            display: grid;
            grid-template-columns: 2fr 320px;
            gap: 30px;
            overflow-y: auto;
            max-height: calc(90vh - 390px);
        }

        .overview {
            color: var(--muted);
            line-height: 1.75;
        }

        .info-panel {
            background: rgba(255,255,255,0.045);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            height: fit-content;
        }

        .info-row {
            margin-bottom: 17px;
        }

        .info-row small {
            display: block;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 4px;
            font-weight: 900;
        }

        .episode-list {
            display: grid;
            gap: 8px;
            margin-top: 14px;
        }

        .episode-item {
            display: flex;
            gap: 16px;
            padding: 15px;
            border-radius: 14px;
            background: rgba(255,255,255,0.045);
            border: 1px solid transparent;
            cursor: pointer;
        }

        .episode-item:hover,
        .episode-item.active {
            background: rgba(255,255,255,0.09);
            border-color: rgba(255,255,255,0.16);
        }

        #playerModal .modal {
            width: 100vw;
            height: 100vh;
            max-height: none;
            border-radius: 0;
            background: #000;
            position: relative;
        }

        .player-header {
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            z-index: 5;
            display: flex;
            justify-content: space-between;
            align-items: start;
            padding: 26px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            transition: opacity .25s ease;
        }

        .player-title h3 {
            font-size: 1.35rem;
            margin-bottom: 4px;
        }

        .player-title p {
            color: #aaa;
        }

        .player-wrapper {
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            outline: none;
            background: #000;
        }

        .loading {
            position: absolute;
            inset: 0;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: rgba(0,0,0,0.68);
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.14);
            border-top-color: var(--brand);
            animation: spin 1s linear infinite;
            margin-bottom: 18px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading h3 {
            margin-bottom: 8px;
        }

        .loading p {
            color: #bbb;
            max-width: 520px;
        }

        .toast-container {
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 999;
            display: grid;
            gap: 10px;
        }

        .toast {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            box-shadow: var(--shadow);
            font-weight: 800;
            animation: toastIn .22s ease;
        }

        @keyframes toastIn {
            from { transform: translateX(110%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 820px) {
            .app {
                padding: 16px;
            }

            .topbar {
                flex-wrap: wrap;
            }

            .status {
                display: none;
            }

            .toolbar {
                grid-template-columns: 1fr;
            }

            .grid,
            .grid.landscape {
                grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
                gap: 14px;
            }

            .details-body {
                grid-template-columns: 1fr;
                max-height: none;
            }

            .details-hero {
                height: 330px;
                padding: 22px;
            }

            .player-header {
                padding: 14px;
                gap: 10px;
            }

            .player-header .btn {
                padding: 8px 12px;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <header class="topbar">
            <div class="brand">
                <svg class="brand-icon" viewBox="0 0 64 64" fill="currentColor">
                    <path d="M17 10h11l19 44H36L17 10Z"></path>
                    <path d="M36 10h11v44H36z" opacity=".7"></path>
                </svg>
                StreamX
            </div>

            <div class="grow"></div>

            <div class="status">
                <span id="statusDot" class="status-dot"></span>
                <span id="statusText">Waiting for login</span>
            </div>

            <button id="openLoginBtn" class="btn btn-brand">Login</button>
            <button id="logoutBtn" class="btn btn-soft hidden">Logout</button>
        </header>

        <section id="toolbar" class="toolbar hidden">
            <input id="searchInput" class="input" type="search" placeholder="Search movies, series, live TV..." />

            <select id="typeFilter" class="input">
                <option value="all">All Content</option>
                <option value="live">Live TV</option>
                <option value="movie">Movies</option>
                <option value="series">Series</option>
            </select>

            <select id="categoryFilter" class="input">
                <option value="all">All Categories</option>
            </select>
        </section>

        <main id="content">
            <div id="emptyState" class="hero-empty">
                <h1>StreamX Secure Pro</h1>
                <p>Login to connect to your private provider.</p>
            </div>
        </main>
    </div>

    <dialog id="loginModal">
        <div class="modal login-modal">
            <h2>Secure Gate</h2>
            <p>Enter your gate credentials. Provider credentials stay private on the server.</p>

            <form id="loginForm" class="login-form">
                <input id="gateUser" class="input" placeholder="Username" autocomplete="username" required />
                <input id="gatePass" class="input" placeholder="Password" type="password" autocomplete="current-password" required />
                <button class="btn btn-brand" type="submit">Connect</button>
                <button class="btn btn-soft" type="button" id="closeLoginBtn">Cancel</button>
            </form>
        </div>
    </dialog>

    <dialog id="detailsModal">
        <div class="modal">
            <div id="detailHero" class="details-hero">
                <div class="details-content">
                    <div id="detailBadges" class="badges"></div>
                    <h2 id="detailTitle">Title</h2>
                    <p id="detailDesc" class="details-desc"></p>

                    <div class="details-actions">
                        <button id="playBtn" class="btn btn-brand">▶ Play</button>
                        <button id="copyVlcBtn" class="btn btn-soft">Copy VLC Link</button>
                        <button id="closeDetailsBtn" class="btn btn-soft">Close</button>
                    </div>
                </div>
            </div>

            <div class="details-body">
                <div>
                    <h3 style="margin-bottom:12px;">Overview</h3>
                    <p id="detailLongDesc" class="overview"></p>

                    <div id="seriesBlock" class="hidden" style="margin-top:28px;">
                        <h3 style="margin-bottom:12px;">Seasons</h3>
                        <div id="seasonRow" style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;"></div>

                        <h3>Episodes</h3>
                        <div id="episodeList" class="episode-list"></div>
                    </div>
                </div>

                <aside class="info-panel">
                    <h3 style="margin-bottom:18px;">Information</h3>
                    <div id="detailMeta"></div>
                </aside>
            </div>
        </div>
    </dialog>

    <dialog id="playerModal">
        <div class="modal">
            <div id="playerHeader" class="player-header">
                <div class="player-title">
                    <h3 id="playerTitle">Video</h3>
                    <p id="playerSub"></p>
                </div>

                <div style="display:flex;gap:10px;">
                    <button id="copyPlayerLinkBtn" class="btn btn-soft">Copy VLC Link</button>
                    <button id="closePlayerBtn" class="btn btn-soft">✕</button>
                </div>
            </div>

            <div id="playerLoading" class="loading hidden">
                <div id="spinner" class="spinner"></div>
                <h3 id="loadingTitle">Loading Stream...</h3>
                <p id="loadingSub">Connecting to server...</p>
            </div>

            <div class="player-wrapper">
                <video id="videoPlayer" controls playsinline></video>
            </div>
        </div>
    </dialog>

    <div id="toastContainer" class="toast-container"></div>

    <script>
        const state = {
            auth: false,
            categories: { live: [], movie: [], series: [] },
            live: [],
            movie: [],
            series: [],
            filtered: { live: [], movie: [], series: [] },
            selectedItem: null,
            selectedEpisode: null,
            currentEpisodes: {},
            hls: null,
            searchTimer: null,
            currentRawUrl: "",
            currentPlayUrl: "",
            renderLimits: { live: 32, movie: 64, series: 32 },
            history: []
        };

        const els = {
            content: document.getElementById("content"),
            emptyState: document.getElementById("emptyState"),
            toolbar: document.getElementById("toolbar"),
            loginModal: document.getElementById("loginModal"),
            detailsModal: document.getElementById("detailsModal"),
            playerModal: document.getElementById("playerModal"),
            statusDot: document.getElementById("statusDot"),
            statusText: document.getElementById("statusText"),
            toast: document.getElementById("toastContainer"),
            video: document.getElementById("videoPlayer"),
            loading: document.getElementById("playerLoading"),
            spinner: document.getElementById("spinner"),
            loadingTitle: document.getElementById("loadingTitle"),
            loadingSub: document.getElementById("loadingSub")
        };

        const esc = value => String(value ?? "").replace(/[&<>"']/g, ch => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
        }[ch]));

        function toast(message, type = "info") {
            const el = document.createElement("div");
            el.className = "toast";
            el.textContent = message;
            els.toast.appendChild(el);

            setTimeout(() => {
                el.style.opacity = "0";
                el.style.transform = "translateX(110%)";
                setTimeout(() => el.remove(), 250);
            }, 3500);
        }

        function setStatus(text, active = false) {
            els.statusText.textContent = text;
            els.statusDot.classList.toggle("active", active);
        }

        async function api(path, options = {}) {
            const res = await fetch(path, {
                headers: {
                    "Content-Type": "application/json",
                    ...(options.headers || {})
                },
                ...options
            });

            const data = await res.json().catch(() => null);

            if (!res.ok || !data || data.ok === false) {
                throw new Error(data?.message || `Request failed: ${res.status}`);
            }

            return data;
        }

        function showLoading(title, sub, spin = true) {
            els.loadingTitle.textContent = title;
            els.loadingSub.textContent = sub || "";
            els.spinner.style.display = spin ? "block" : "none";
            els.loading.classList.remove("hidden");
        }

        function hideLoading() {
            els.loading.classList.add("hidden");
        }

        function getCategoryName(type, categoryId) {
            const found = state.categories[type]?.find(c => String(c.category_id) === String(categoryId));
            return found?.category_name || "Uncategorized";
        }

        function normalizeItem(type, item) {
            if (type === "live") {
                return {
                    type: "live",
                    id: item.stream_id,
                    title: item.name,
                    image: item.stream_icon,
                    categoryId: item.category_id,
                    ext: "m3u8"
                };
            }

            if (type === "movie") {
                return {
                    type: "movie",
                    id: item.stream_id,
                    title: item.name,
                    image: item.stream_icon,
                    categoryId: item.category_id,
                    ext: item.container_extension || "mp4",
                    rating: item.rating
                };
            }

            return {
                type: "series",
                id: item.series_id,
                title: item.name,
                image: item.cover,
                categoryId: item.category_id,
                rating: item.rating
            };
        }

        async function login(event) {
            event.preventDefault();

            const username = document.getElementById("gateUser").value.trim();
            const password = document.getElementById("gatePass").value.trim();

            try {
                setStatus("Connecting...", false);

                await api("/api/login", {
                    method: "POST",
                    body: JSON.stringify({ username, password })
                });

                state.auth = true;
                loadHistory();

                els.loginModal.close();
                document.getElementById("openLoginBtn").classList.add("hidden");
                document.getElementById("logoutBtn").classList.remove("hidden");
                els.toolbar.classList.remove("hidden");
                els.emptyState.classList.add("hidden");

                setStatus("Loading library...", true);
                await loadLibrary();

                setStatus("Connected", true);
                toast("Connected successfully");
            } catch (error) {
                setStatus("Login failed", false);
                toast(error.message, "error");
            }
        }

        async function loadLibrary() {
            const [
                liveCats,
                movieCats,
                seriesCats,
                liveList,
                movieList,
                seriesList
            ] = await Promise.all([
                api("/api/categories/live"),
                api("/api/categories/movie"),
                api("/api/categories/series"),
                api("/api/list/live"),
                api("/api/list/movie"),
                api("/api/list/series")
            ]);

            state.categories.live = liveCats.data;
            state.categories.movie = movieCats.data;
            state.categories.series = seriesCats.data;

            state.live = liveList.data.map(i => normalizeItem("live", i));
            state.movie = movieList.data.map(i => normalizeItem("movie", i));
            state.series = seriesList.data.map(i => normalizeItem("series", i));

            updateCategoryDropdown();
            applyFilters();
        }

        function updateCategoryDropdown() {
            const type = document.getElementById("typeFilter").value;
            const select = document.getElementById("categoryFilter");

            let categories = [];

            if (type === "all") {
                categories = [
                    ...state.categories.live,
                    ...state.categories.movie,
                    ...state.categories.series
                ];
            } else {
                categories = state.categories[type] || [];
            }

            const seen = new Set();
            const unique = categories.filter(cat => {
                const key = String(cat.category_id);
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });

            select.innerHTML = `
                <option value="all">All Categories</option>
                ${unique.map(c => `<option value="${esc(c.category_id)}">${esc(c.category_name)}</option>`).join("")}
            `;
        }

        function applyFilters() {
            clearTimeout(state.searchTimer);

            state.searchTimer = setTimeout(() => {
                const query = document.getElementById("searchInput").value.trim().toLowerCase();
                const type = document.getElementById("typeFilter").value;
                const category = document.getElementById("categoryFilter").value;

                const filterItem = item => {
                    const titleMatch = !query || item.title.toLowerCase().includes(query);
                    const categoryMatch = category === "all" || String(item.categoryId) === String(category);
                    return titleMatch && categoryMatch;
                };

                state.filtered.live = type === "all" || type === "live" ? state.live.filter(filterItem) : [];
                state.filtered.movie = type === "all" || type === "movie" ? state.movie.filter(filterItem) : [];
                state.filtered.series = type === "all" || type === "series" ? state.series.filter(filterItem) : [];

                renderCatalog();
            }, 180);
        }

        function renderCatalog() {
            let html = "";

            const type = document.getElementById("typeFilter").value;
            const query = document.getElementById("searchInput").value.trim();

            if (type === "all" && !query && state.history.length) {
                const historyItems = state.history.slice(0, 8).map(h => {
                    const source = state[h.type]?.find(i => String(i.id) === String(h.id));
                    return source ? { ...source, progress: h.progress } : null;
                }).filter(Boolean);

                if (historyItems.length) {
                    html += buildSection("Continue Watching", historyItems, true);
                }
            }

            if (state.filtered.live.length) {
                html += buildSection("Live TV", state.filtered.live.slice(0, state.renderLimits.live), true);
            }

            if (state.filtered.movie.length) {
                html += buildSection("Movies", state.filtered.movie.slice(0, state.renderLimits.movie), false);
            }

            if (state.filtered.series.length) {
                html += buildSection("Series", state.filtered.series.slice(0, state.renderLimits.series), false);
            }

            els.content.innerHTML = html || `
                <div class="hero-empty">
                    <h1>No results</h1>
                    <p>Try another search or category.</p>
                </div>
            `;
        }

        function buildSection(title, items, landscape) {
            return `
                <section class="section">
                    <div class="section-head">
                        <h2>${esc(title)}</h2>
                    </div>
                    <div class="grid ${landscape ? "landscape" : ""}">
                        ${items.map(item => `
                            <article class="card ${landscape ? "landscape" : ""}" data-type="${esc(item.type)}" data-id="${esc(item.id)}">
                                <img
                                    src="${esc(item.image || "https://via.placeholder.com/500x750?text=StreamX")}"
                                    loading="lazy"
                                    onerror="this.src='https://via.placeholder.com/500x750?text=StreamX'"
                                />
                                <div class="card-gradient">
                                    <div class="card-title">${esc(item.title)}</div>
                                    <div class="card-meta">
                                        <span class="type-pill">${item.type === "movie" ? "MOVIE" : item.type.toUpperCase()}</span>
                                        <span>•</span>
                                        <span>${esc(getCategoryName(item.type, item.categoryId))}</span>
                                    </div>
                                </div>
                                ${item.progress ? `<div class="progress"><div style="width:${Math.min(100, Number(item.progress) || 0)}%"></div></div>` : ""}
                            </article>
                        `).join("")}
                    </div>
                </section>
            `;
        }

        async function openDetails(type, id) {
            const item = state[type]?.find(i => String(i.id) === String(id));

            if (!item) {
                toast("Item not found", "error");
                return;
            }

            state.selectedItem = item;
            state.selectedEpisode = null;
            state.currentEpisodes = {};
            state.currentRawUrl = "";

            document.getElementById("detailHero").style.backgroundImage = `url('${item.image || ""}')`;
            document.getElementById("detailTitle").textContent = item.title;

            document.getElementById("detailBadges").innerHTML = `
                <span class="badge brand">${item.type === "movie" ? "MOVIE" : item.type.toUpperCase()}</span>
                <span class="badge">${esc(getCategoryName(item.type, item.categoryId))}</span>
                ${item.rating ? `<span class="badge">★ ${esc(item.rating)}</span>` : ""}
            `;

            let desc = "No description available.";
            document.getElementById("seriesBlock").classList.add("hidden");

            try {
                if (type === "movie") {
                    const info = await api(`/api/info/movie/${encodeURIComponent(id)}`);
                    desc = info.data?.info?.plot || desc;
                }

                if (type === "series") {
                    const info = await api(`/api/info/series/${encodeURIComponent(id)}`);
                    desc = info.data?.info?.plot || desc;
                    document.getElementById("seriesBlock").classList.remove("hidden");
                    renderSeasons(info.data?.episodes || {});
                }
            } catch {
                toast("Could not load full details", "warning");
            }

            document.getElementById("detailDesc").textContent =
                desc.length > 220 ? desc.slice(0, 220) + "..." : desc;

            document.getElementById("detailLongDesc").textContent = desc;

            document.getElementById("detailMeta").innerHTML = `
                <div class="info-row">
                    <small>Content ID</small>
                    <strong>${esc(item.id)}</strong>
                </div>
                <div class="info-row">
                    <small>Type</small>
                    <strong>${esc(item.type === "movie" ? "Movie" : item.type)}</strong>
                </div>
                <div class="info-row">
                    <small>Format</small>
                    <strong>${esc(item.ext || "HLS / Episodes")}</strong>
                </div>
            `;

            els.detailsModal.showModal();
        }

        function renderSeasons(episodesObj) {
            state.currentEpisodes = episodesObj || {};

            const seasons = Object.keys(state.currentEpisodes).sort((a, b) => Number(a) - Number(b));
            const row = document.getElementById("seasonRow");
            const list = document.getElementById("episodeList");

            if (!seasons.length) {
                row.innerHTML = "";
                list.innerHTML = "<p style='color:var(--muted)'>No episodes found.</p>";
                return;
            }

            row.innerHTML = seasons.map((season, index) => `
                <button class="btn btn-soft btn-small season-btn ${index === 0 ? "active" : ""}" data-season="${esc(season)}">
                    Season ${esc(season)}
                </button>
            `).join("");

            renderEpisodes(seasons[0]);
        }

        function renderEpisodes(season) {
            const eps = state.currentEpisodes[season] || [];
            const list = document.getElementById("episodeList");

            list.innerHTML = eps.map((ep, index) => `
                <div class="episode-item" data-index="${index}" data-season="${esc(season)}">
                    <div style="font-size:1.4rem;font-weight:900;color:var(--muted);min-width:42px;">
                        ${esc(ep.episode_num || index + 1)}
                    </div>
                    <div>
                        <div style="font-weight:900;margin-bottom:4px;">
                            ${esc(ep.title || `Episode ${ep.episode_num || index + 1}`)}
                        </div>
                        <div style="color:var(--muted);font-size:.92rem;">
                            ${esc(ep.info?.duration || "Unknown duration")} • ${esc(ep.container_extension || "mp4")}
                        </div>
                    </div>
                </div>
            `).join("");
        }

        function selectEpisode(season, index) {
            const ep = state.currentEpisodes[season]?.[Number(index)];

            if (!ep) {
                toast("Episode not found", "error");
                return;
            }

            state.selectedEpisode = {
                id: ep.id,
                title: ep.title || `Episode ${ep.episode_num || Number(index) + 1}`,
                ext: ep.container_extension || "mp4"
            };

            document.querySelectorAll(".episode-item").forEach(el => el.classList.remove("active"));
            const selected = document.querySelector(`.episode-item[data-season="${CSS.escape(season)}"][data-index="${index}"]`);
            selected?.classList.add("active");

            toast("Episode selected");
        }

        async function getStreamLinks() {
            const item = state.selectedItem;

            if (!item) {
                throw new Error("No item selected");
            }

            let type = item.type;
            let id = item.id;
            let ext = item.ext || "mp4";

            if (item.type === "movie") {
                type = "movie";
            }

            if (item.type === "series") {
                if (!state.selectedEpisode) {
                    throw new Error("Select an episode first");
                }

                type = "series";
                id = state.selectedEpisode.id;
                ext = state.selectedEpisode.ext || "mp4";
            }

            const data = await api(`/api/link/${encodeURIComponent(type)}/${encodeURIComponent(id)}?ext=${encodeURIComponent(ext)}`);

            state.currentRawUrl = data.rawUrl;
            state.currentPlayUrl = data.proxiedUrl;

            return data;
        }

        async function startPlayer() {
            try {
                const item = state.selectedItem;

                if (!item) {
                    toast("No item selected", "error");
                    return;
                }

                if (item.type === "series" && !state.selectedEpisode) {
                    toast("Select an episode first", "warning");
                    return;
                }

                const links = await getStreamLinks();

                let title = item.title;

                if (item.type === "series" && state.selectedEpisode) {
                    title = `${item.title} - ${state.selectedEpisode.title}`;
                }

                document.getElementById("playerTitle").textContent = title;
                document.getElementById("playerSub").textContent = getCategoryName(item.type, item.categoryId);

                els.detailsModal.close();
                els.playerModal.showModal();

                showLoading("Loading Stream...", "Connecting to local stream proxy...", true);

                setTimeout(() => loadVideo(links.proxiedUrl, item), 100);
            } catch (error) {
                toast(error.message, "error");
            }
        }

        function loadVideo(url, item) {
            const video = els.video;

            if (state.hls) {
                state.hls.destroy();
                state.hls = null;
            }

            video.pause();
            video.removeAttribute("src");
            video.load();

            video.onplaying = hideLoading;
            video.oncanplay = hideLoading;
            video.onwaiting = () => showLoading("Buffering...", "", true);
            video.onerror = () => {
                showLoading("Playback Error", "Browser cannot play this stream. Try copying the VLC link.", false);
            };

            video.ontimeupdate = () => {
                if (video.currentTime > 30 && item.type !== "live") {
                    saveHistory(video.currentTime, video.duration);
                }
            };

            const isHls = url.includes(".m3u8") || item.type === "live";

            if (isHls && window.Hls && Hls.isSupported()) {
                state.hls = new Hls({
                    debug: false,
                    enableWorker: true,
                    lowLatencyMode: true,
                    backBufferLength: 90,
                    manifestLoadingTimeOut: 20000,
                    manifestLoadingMaxRetry: 3,
                    levelLoadingTimeOut: 20000,
                    levelLoadingMaxRetry: 3,
                    fragLoadingTimeOut: 20000,
                    fragLoadingMaxRetry: 3
                });

                state.hls.loadSource(url);
                state.hls.attachMedia(video);

                state.hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {
                        hideLoading();
                        toast("Press play to start", "info");
                    });
                });

                state.hls.on(Hls.Events.ERROR, (event, data) => {
                    console.warn("HLS error:", data);

                    if (!data.fatal) return;

                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                        toast("Network issue. Recovering...", "warning");
                        state.hls.startLoad();
                        return;
                    }

                    if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                        toast("Media issue. Recovering...", "warning");
                        state.hls.recoverMediaError();
                        return;
                    }

                    state.hls.destroy();
                    state.hls = null;
                    showLoading("Stream Error", "Stream failed. Copy VLC link may still work.", false);
                });

                return;
            }

            if (isHls && video.canPlayType("application/vnd.apple.mpegurl")) {
                video.src = url;
                video.play().catch(() => {
                    hideLoading();
                    toast("Press play to start", "info");
                });
                return;
            }

            video.src = url;
            video.play().catch(() => {
                showLoading("Playback Blocked", "Autoplay blocked or format unsupported. Try VLC link.", false);
            });
        }

        function closePlayer() {
            if (state.hls) {
                state.hls.destroy();
                state.hls = null;
            }

            els.video.pause();
            els.video.removeAttribute("src");
            els.video.load();
            hideLoading();

            if (els.playerModal.open) {
                els.playerModal.close();
            }

            renderCatalog();
        }

        async function copyText(text) {
            if (!text) {
                toast("No link available", "error");
                return;
            }

            try {
                await navigator.clipboard.writeText(text);
                toast("VLC link copied");
                return;
            } catch {}

            const textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.style.position = "fixed";
            textarea.style.opacity = "0";
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();

            try {
                document.execCommand("copy");
                toast("VLC link copied");
            } catch {
                console.log("VLC link:", text);
                toast("Copy failed. Link printed in console.", "error");
            }

            textarea.remove();
        }

        async function copyVlcLink() {
            try {
                if (!state.currentRawUrl) {
                    await getStreamLinks();
                }

                await copyText(state.currentRawUrl);
            } catch (error) {
                toast(error.message, "error");
            }
        }

        function saveHistory(time, duration) {
            if (!duration || duration < 60 || !state.selectedItem) return;

            const item = state.selectedItem;
            const progress = Math.max(1, Math.min(100, Math.round((time / duration) * 100)));

            state.history = state.history.filter(h => !(h.type === item.type && String(h.id) === String(item.id)));
            state.history.unshift({
                type: item.type,
                id: item.id,
                progress,
                time: Date.now()
            });

            state.history = state.history.slice(0, 40);

            localStorage.setItem("streamx_history", JSON.stringify(state.history));
        }

        function loadHistory() {
            try {
                state.history = JSON.parse(localStorage.getItem("streamx_history")) || [];
            } catch {
                state.history = [];
            }
        }

        function logout() {
            closePlayer();

            state.auth = false;
            state.live = [];
            state.movie = [];
            state.series = [];
            state.filtered = { live: [], movie: [], series: [] };
            state.selectedItem = null;
            state.selectedEpisode = null;
            state.currentRawUrl = "";

            document.getElementById("logoutBtn").classList.add("hidden");
            document.getElementById("openLoginBtn").classList.remove("hidden");
            els.toolbar.classList.add("hidden");

            els.content.innerHTML = "";
            els.emptyState.classList.remove("hidden");
            els.content.appendChild(els.emptyState);

            setStatus("Waiting for login", false);
        }

        document.getElementById("openLoginBtn").onclick = () => els.loginModal.showModal();
        document.getElementById("closeLoginBtn").onclick = () => els.loginModal.close();
        document.getElementById("loginForm").onsubmit = login;
        document.getElementById("logoutBtn").onclick = logout;

        document.getElementById("searchInput").oninput = applyFilters;

        document.getElementById("typeFilter").onchange = () => {
            updateCategoryDropdown();
            applyFilters();
        };

        document.getElementById("categoryFilter").onchange = applyFilters;

        document.getElementById("content").addEventListener("click", event => {
            const card = event.target.closest(".card");
            if (!card) return;

            openDetails(card.dataset.type, card.dataset.id);
        });

        document.getElementById("seasonRow").addEventListener("click", event => {
            const btn = event.target.closest(".season-btn");
            if (!btn) return;

            document.querySelectorAll(".season-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");

            renderEpisodes(btn.dataset.season);
        });

        document.getElementById("episodeList").addEventListener("click", event => {
            const ep = event.target.closest(".episode-item");
            if (!ep) return;

            selectEpisode(ep.dataset.season, ep.dataset.index);
        });

        document.getElementById("playBtn").onclick = startPlayer;
        document.getElementById("copyVlcBtn").onclick = copyVlcLink;
        document.getElementById("copyPlayerLinkBtn").onclick = copyVlcLink;
        document.getElementById("closeDetailsBtn").onclick = () => els.detailsModal.close();
        document.getElementById("closePlayerBtn").onclick = closePlayer;

        let hideHeaderTimer;
        document.getElementById("playerModal").addEventListener("mousemove", () => {
            const header = document.getElementById("playerHeader");
            header.style.opacity = "1";

            clearTimeout(hideHeaderTimer);
            hideHeaderTimer = setTimeout(() => {
                header.style.opacity = "0";
            }, 3000);
        });

        window.addEventListener("scroll", () => {
            if (!state.auth || els.detailsModal.open || els.playerModal.open) return;

            if (window.innerHeight + window.scrollY < document.body.offsetHeight - 900) return;

            const type = document.getElementById("typeFilter").value;
            let changed = false;

            if ((type === "all" || type === "live") && state.renderLimits.live < state.filtered.live.length) {
                state.renderLimits.live += 32;
                changed = true;
            }

            if ((type === "all" || type === "movie") && state.renderLimits.movie < state.filtered.movie.length) {
                state.renderLimits.movie += 64;
                changed = true;
            }

            if ((type === "all" || type === "series") && state.renderLimits.series < state.filtered.series.length) {
                state.renderLimits.series += 32;
                changed = true;
            }

            if (changed) renderCatalog();
        });

        window.addEventListener("keydown", event => {
            if (event.key === "Escape" && els.playerModal.open) {
                closePlayer();
            }
        });
    </script>
</body>
</html>
